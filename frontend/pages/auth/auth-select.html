<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medflow - Select Role</title>
  <link rel="stylesheet" href="../css/styles.css">
  <script src="../js/app.js"></script>
</head>
<body>

<h1>Medflow</h1>
<h2>Select Role &amp; Action</h2>

<div id="role-selection">
  <label><input type="radio" name="role" value="admin"> Admin</label>
  <label><input type="radio" name="role" value="clinician"> Clinician</label>
</div>

<div id="action-buttons">
  <button id="login-btn" disabled>Login</button>
  <button id="signup-btn" disabled>Sign Up</button>
</div>

<script>
  const roleRadios = document.querySelectorAll('input[name="role"]');
  let selectedRole = null;

  roleRadios.forEach(radio => {
    radio.addEventListener('change', () => {
      selectedRole = radio.value;
      document.getElementById('login-btn').disabled = false;
      document.getElementById('signup-btn').disabled = false;
    });
  });

  document.getElementById('login-btn').addEventListener('click', () => {
    if (selectedRole) {
      // navigate to the static HTML page
      window.location.href = `${selectedRole}/login.html`;
    }
  });

  document.getElementById('signup-btn').addEventListener('click', () => {
    if (selectedRole) {
      window.location.href = `${selectedRole}/signup.html`;
    }
  });
</script>

</body>
</html>
