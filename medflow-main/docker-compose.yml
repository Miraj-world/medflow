version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: medflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: medflow
      POSTGRES_PASSWORD: medflow
      POSTGRES_DB: medflow
    ports:
      - "5432:5432"
    volumes:
      - medflow-postgres-data:/var/lib/postgresql/data

volumes:
  medflow-postgres-data:
