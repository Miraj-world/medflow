<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Details</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<h1>Patient Details</h1>

<div id="patient-detail" style="border: 1px solid #ccc; padding: 20px; margin: 20px 0;">
  Loading...
</div>

<div>
  <a id="edit-link" href="#">Edit Patient</a> |
  <a href="patients.html">Back to Patients</a>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const patientId = urlParams.get('id');
  
  if (!patientId) {
    document.getElementById('patient-detail').innerHTML = 'Patient ID not found';
    document.getElementById('edit-link').style.display = 'none';
  } else {
    fetch(`http://127.0.0.1:8000/patients/${patientId}`)
      .then(r => {
        if (!r.ok) throw new Error('Patient not found');
        return r.json();
      })
      .then(patient => {
        document.querySelector('h1').textContent = 'Patient Details: ' + patient.name;
        document.getElementById('patient-detail').innerHTML = `
          <p><strong>ID:</strong> ${patient.id}</p>
          <p><strong>Name:</strong> ${patient.name}</p>
          <p><strong>DOB:</strong> ${patient.dob}</p>
          <p><strong>Gender:</strong> ${patient.gender}</p>
          <p><strong>Phone:</strong> ${patient.phone}</p>
          <p><strong>Address:</strong> ${patient.address}</p>
          <p><strong>Medical Notes:</strong></p>
          <p>${patient.notes || 'No notes'}</p>
        `;
        
        document.getElementById('edit-link').href = `patient-edit.html?id=${patient.id}`;
      })
      .catch(err => {
        document.getElementById('patient-detail').innerHTML = `<p style="color: red;">Error: ${err.message}</p>`;
      });
  }
</script>

</body>
</html>
