<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clinician Login - Medflow</title>
  <link rel="stylesheet" href="../../css/styles.css">
  <script src="../../js/app.js"></script>
</head>
<body>

<h1>Clinician Login</h1>
<p>Access clinical workspace</p>

<form id="clinician-login-form">
  <label>Email:<br><input type="email" name="email" required></label><br><br>
  <label>Password:<br><input type="password" name="password" required></label><br><br>
  <label>License ID:<br><input type="text" name="license"></label><br><br>
  <button type="submit">Login as Clinician</button>
</form>

<p>Don't have an account? <a href="signup.html">Sign up</a></p>
<p><a href="../../../index.html">Back</a></p>

<script>
  const form = document.getElementById('clinician-login-form');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = new FormData(form);
    const body = Object.fromEntries(data.entries());
    body.role = 'clinician';
    try {
      const resp = await fetch('http://127.0.0.1:8000/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!resp.ok) {
        const err = await resp.json();
        throw new Error(err.detail || 'Login failed');
      }
      const d = await resp.json();
      localStorage.setItem('token', d.access_token);
      window.location.href = '/clinician/dashboard';
    } catch (err) {
      alert(err.message);
    }
  });
</script>

</body>
</html>
