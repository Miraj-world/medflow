<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Signup - Medflow</title>
  <link rel="stylesheet" href="../../css/styles.css">
  <script src="../../js/app.js"></script>
</head>
<body>

<h1>Admin Signup</h1>
<p>Create administrative access</p>

<form id="admin-signup-form">
  <label>Full Name:<br><input type="text" name="name" required></label><br><br>
  <label>Email:<br><input type="email" name="email" required></label><br><br>
  <label>Password:<br><input type="password" name="password" required></label><br><br>
  <label>Confirm Password:<br><input type="password" name="confirm" required></label><br><br>
  <label>Organization / Hospital:<br><input type="text" name="organization" required></label><br><br>
  <button type="submit">Create Admin Account</button>
</form>

<p>Already have an account? <a href="login.html">Log in</a></p>
<p><a href="../../../index.html">Back</a></p>

<script>
  const form = document.getElementById('admin-signup-form');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = new FormData(form);
    const body = Object.fromEntries(data.entries());

    if (body.password !== body.confirm) {
      alert('Passwords do not match');
      return;
    }
    // include role
    body.role = 'admin';
    try {
      const resp = await fetch('http://127.0.0.1:8000/auth/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!resp.ok) {
        const err = await resp.json();
        throw new Error(err.detail || 'Signup failed');
      }
      // auto-login by requesting token
      const loginResp = await fetch('http://127.0.0.1:8000/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: body.email, password: body.password, role: 'admin' })
      });
      const loginData = await loginResp.json();
      localStorage.setItem('token', loginData.access_token);
      window.location.href = '/admin/dashboard';
    } catch (err) {
      alert(err.message);
    }
  });
</script>

</body>
</html>
