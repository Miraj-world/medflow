<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appointments</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<h1>Appointments</h1>

<a href="appointment-form.html" style="display: block; margin: 20px 0;">+ New Appointment</a>

<div>
  <label>Filter by Status:
    <select id="status-filter" onchange="filterByStatus()">
      <option value="">All</option>
      <option value="Scheduled">Scheduled</option>
      <option value="Completed">Completed</option>
      <option value="Cancelled">Cancelled</option>
    </select>
  </label>
</div>

<table border="1" style="width: 100%; margin-top: 20px; border-collapse: collapse;">
  <thead>
    <tr>
      <th>Patient</th>
      <th>Date</th>
      <th>Time</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="appointment-table">
    <tr><td colspan="5">Loading...</td></tr>
  </tbody>
</table>

<script>
  let allAppointments = [];
  let patientMap = {};
  
  async function loadPatients() {
    try {
      const token = localStorage.getItem('token');
      const resp = await fetch('http://127.0.0.1:8000/patients', {
        headers: {
          'Authorization': `Bearer ${token}`
        }
      });
      
      if (!resp.ok) throw new Error('Failed to load patients');
      
      const patients = await resp.json();
      patients.forEach(p => {
        patientMap[p.id] = p.name;
      });
    } catch (err) {
      console.error('Error loading patients:', err);
    }
  }
  
  async function loadAppointments() {
    try {
      const token = localStorage.getItem('token');
      const resp = await fetch('http://127.0.0.1:8000/appointments', {
        headers: {
          'Authorization': `Bearer ${token}`
        }
      });
      
      if (!resp.ok) throw new Error('Failed to load appointments');
      
      allAppointments = await resp.json();
      await loadPatients();
      renderAppointments(allAppointments);
    } catch (err) {
      document.getElementById('appointment-table').innerHTML = 
        `<tr><td colspan="5">Error: ${err.message}</td></tr>`;
    }
  }
  
  function renderAppointments(appointments) {
    const tbody = document.getElementById('appointment-table');
    if (appointments.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5">No appointments found</td></tr>';
      return;
    }
    
    tbody.innerHTML = appointments.map(a => `
      <tr>
        <td>${patientMap[a.patient_id] || a.patient_id}</td>
        <td>${a.date}</td>
        <td>${a.time}</td>
        <td>${a.status}</td>
        <td>
          <a href="appointment-details.html?id=${a.id}">View</a>
          <a href="appointment-form.html?id=${a.id}">Edit</a>
          <button onclick="deleteAppointment('${a.id}')">Delete</button>
        </td>
      </tr>
    `).join('');
  }
  
  function filterByStatus() {
    const status = document.getElementById('status-filter').value;
    if (!status) {
      renderAppointments(allAppointments);
    } else {
      const filtered = allAppointments.filter(a => a.status === status);
      renderAppointments(filtered);
    }
  }
  
  async function deleteAppointment(apptId) {
    if (!confirm('Delete this appointment?')) return;
    
    try {
      const token = localStorage.getItem('token');
      const resp = await fetch(`http://127.0.0.1:8000/appointments/${apptId}`, {
        method: 'DELETE',
        headers: {
          'Authorization': `Bearer ${token}`
        }
      });
      
      if (!resp.ok) throw new Error('Delete failed');
      
      alert('Appointment deleted');
      loadAppointments();
    } catch (err) {
      alert('Error: ' + err.message);
    }
  }
  
  loadAppointments();
</script>

</body>
</html>
