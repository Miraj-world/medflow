<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Patient</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<h1>Edit Patient</h1>

<form id="patient-form">
  <input type="hidden" id="patient-id" name="id">
  
  <label>Name<br>
    <input type="text" id="name" name="name" required>
  </label><br><br>

  <label>Date of Birth<br>
    <input type="date" id="dob" name="dob" required>
  </label><br><br>

  <label>Gender<br>
    <select id="gender" name="gender" required>
      <option value="">-- Select --</option>
      <option value="Male">Male</option>
      <option value="Female">Female</option>
      <option value="Other">Other</option>
    </select>
  </label><br><br>

  <label>Phone<br>
    <input type="tel" id="phone" name="phone" required>
  </label><br><br>

  <label>Address<br>
    <input type="text" id="address" name="address" required>
  </label><br><br>

  <label>Medical Notes<br>
    <textarea id="notes" name="notes"></textarea>
  </label><br><br>

  <button type="submit">Save Patient</button>
  <a href="patients.html">Cancel</a>
</form>

<script>
  const form = document.getElementById('patient-form');
  const patientIdField = document.getElementById('patient-id');
  
  // Check if we're editing an existing patient
  const urlParams = new URLSearchParams(window.location.search);
  const patientId = urlParams.get('id');
  
  if (patientId) {
    // Load existing patient
    apiFetch(`http://127.0.0.1:8000/patients/${patientId}`)
      .then(r => r.json())
      .then(patient => {
        patientIdField.value = patient.id;
        document.getElementById('name').value = patient.name;
        document.getElementById('dob').value = patient.dob;
        document.getElementById('gender').value = patient.gender;
        document.getElementById('phone').value = patient.phone;
        document.getElementById('address').value = patient.address;
        document.getElementById('notes').value = patient.notes || '';
        document.querySelector('h1').textContent = 'Edit Patient: ' + patient.name;
      })
      .catch(err => {
        alert('Failed to load patient: ' + err.message);
        window.location.href = 'patients.html';
      });
  }
  
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const data = {
      name: document.getElementById('name').value,
      dob: document.getElementById('dob').value,
      gender: document.getElementById('gender').value,
      phone: document.getElementById('phone').value,
      address: document.getElementById('address').value,
      notes: document.getElementById('notes').value
    };
    if (patientIdField.value) {
      data.id = patientIdField.value;
    }
    
    try {
      const token = localStorage.getItem('token');
      const method = patientIdField.value ? 'PUT' : 'POST';
      const url = patientIdField.value 
        ? `http://127.0.0.1:8000/patients/${data.id}`
        : 'http://127.0.0.1:8000/patients';
      
      const resp = await fetch(url, {
        method: method,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify(data)
      });
      
      if (!resp.ok) {
        const err = await resp.json();
        throw new Error(err.detail || 'Failed to save');
      }
      
      alert('Patient saved successfully');
      window.location.href = 'patients.html';
    } catch (err) {
      alert('Error: ' + err.message);
    }
  });
</script>

</body>
</html>
