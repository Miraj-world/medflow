<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appointment Details</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<h1>Appointment Details</h1>

<div id="appointment-detail" style="border: 1px solid #ccc; padding: 20px; margin: 20px 0;">
  Loading...
</div>

<div>
  <a id="edit-link" href="#">Edit Appointment</a> |
  <a href="appointments.html">Back to Appointments</a>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const appointmentId = urlParams.get('id');
  
  if (!appointmentId) {
    document.getElementById('appointment-detail').innerHTML = 'Appointment ID not found';
    document.getElementById('edit-link').style.display = 'none';
  } else {
    apiFetch(`http://127.0.0.1:8000/appointments/${appointmentId}`)
      .then(r => {
        if (!r.ok) throw new Error('Appointment not found');
        return r.json();
      })
      .then(appt => {
        // Get patient name if possible
        apiFetch(`http://127.0.0.1:8000/patients/${appt.patient_id}`)
          .then(r => r.json())
          .then(patient => {
            document.querySelector('h1').textContent = 'Appointment Details: ' + patient.name;
            document.getElementById('appointment-detail').innerHTML = `
              <p><strong>Appointment ID:</strong> ${appt.id}</p>
              <p><strong>Patient:</strong> ${patient.name}</p>
              <p><strong>Date:</strong> ${appt.date}</p>
              <p><strong>Time:</strong> ${appt.time}</p>
              <p><strong>Status:</strong> ${appt.status}</p>
            `;
          })
          .catch(() => {
            // If patient fetch fails, just show appointment info
            document.getElementById('appointment-detail').innerHTML = `
              <p><strong>Appointment ID:</strong> ${appt.id}</p>
              <p><strong>Patient ID:</strong> ${appt.patient_id}</p>
              <p><strong>Date:</strong> ${appt.date}</p>
              <p><strong>Time:</strong> ${appt.time}</p>
              <p><strong>Status:</strong> ${appt.status}</p>
            `;
          });
          
        document.getElementById('edit-link').href = `appointment-form.html?id=${appt.id}`;
      })
      .catch(err => {
        document.getElementById('appointment-detail').innerHTML = `<p style="color: red;">Error: ${err.message}</p>`;
      });
  }
</script>

</body>
</html>
