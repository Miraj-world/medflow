<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appointment</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<h1>New Appointment</h1>

<form id="appointment-form">
  <input type="hidden" id="appointment-id" name="id">

  <label>Patient<br>
    <select id="patient-id" name="patient_id" required>
      <option value="">-- Select Patient --</option>
    </select>
  </label><br><br>

  <label>Date<br>
    <input type="date" id="date" name="date" required>
  </label><br><br>

  <label>Time<br>
    <input type="time" id="time" name="time" required>
  </label><br><br>

  <label>Status<br>
    <select id="status" name="status" required>
      <option value="Scheduled">Scheduled</option>
      <option value="Completed">Completed</option>
      <option value="Cancelled">Cancelled</option>
    </select>
  </label><br><br>

  <button type="submit">Save Appointment</button>
  <a href="appointments.html">Cancel</a>
</form>

<script>
  const form = document.getElementById('appointment-form');
  const appointmentIdField = document.getElementById('appointment-id');
  const urlParams = new URLSearchParams(window.location.search);
  const appointmentId = urlParams.get('id');
  
  // Load patients for dropdown
  async function loadPatients() {
    try {
      const token = localStorage.getItem('token');
      const resp = await apiFetch('http://127.0.0.1:8000/patients');
      
      if (!resp.ok) throw new Error('Failed to load patients');
      
      const patients = await resp.json();
      const select = document.getElementById('patient-id');
      select.innerHTML = '<option value="">-- Select Patient --</option>';
      
      patients.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = p.name + ' (' + p.id + ')';
        select.appendChild(opt);
      });
      
      // If editing, load existing appointment
      if (appointmentId) {
        loadAppointment(appointmentId);
      }
    } catch (err) {
      alert('Error loading patients: ' + err.message);
    }
  }
  
  async function loadAppointment(id) {
    try {
      const token = localStorage.getItem('token');
      const resp = await apiFetch(`http://127.0.0.1:8000/appointments/${id}`);
      
      if (!resp.ok) throw new Error('Appointment not found');
      
      const appt = await resp.json();
      appointmentIdField.value = appt.id;
      document.getElementById('patient-id').value = appt.patient_id;
      document.getElementById('date').value = appt.date;
      document.getElementById('time').value = appt.time;
      document.getElementById('status').value = appt.status;
      document.querySelector('h1').textContent = 'Edit Appointment';
    } catch (err) {
      alert('Error loading appointment: ' + err.message);
      window.location.href = 'appointments.html';
    }
  }
  
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    function generateUUID() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        const r = Math.random() * 16 | 0;
        const v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }
    
    const data = {
      id: appointmentIdField.value || generateUUID(),
      patient_id: document.getElementById('patient-id').value,
      date: document.getElementById('date').value,
      time: document.getElementById('time').value,
      status: document.getElementById('status').value
    };
    
    try {
      const token = localStorage.getItem('token');
      const method = appointmentIdField.value ? 'PUT' : 'POST';
      const url = appointmentIdField.value
        ? `http://127.0.0.1:8000/appointments/${data.id}`
        : 'http://127.0.0.1:8000/appointments';
      
      const resp = await apiFetch(url, {
        method: method,
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
      });
      
      if (!resp.ok) throw new Error('Failed to save');
      
      alert('Appointment saved');
      window.location.href = 'appointments.html';
    } catch (err) {
      alert('Error: ' + err.message);
    }
  });
  
  loadPatients();
</script>

</body>
</html>
